name: GitHub Readme Stats

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # pin cards are slightly broken since im not an organization but whatever
      - name: Generate pin card 1
        uses: vn7n24f1tr1/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: username=QWERTYhu66&repo=sentinelscan-releases
          path: profile/pin-stats-organization-github-readme-stats-1.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card 2
        uses: vn7n24f1tr1/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: username=QWERTYhu66&repo=ytp_3
          path: profile/pin-stats-organization-github-readme-stats-2.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card 3
        uses: vn7n24f1tr1/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: username=QWERTYhu66&repo=Useless-Web-Projects
          path: profile/pin-stats-organization-github-readme-stats-3.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
